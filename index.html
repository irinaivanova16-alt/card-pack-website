<!DOCTYPE html>
<html>
<head>
<title>Image Value Lab</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#1e3a8a,#0f172a);
color:white;
}

header{
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

button{
background:#3b82f6;
border:none;
padding:10px 20px;
border-radius:8px;
color:white;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#2563eb;
}

img{
max-width:100%;
border-radius:10px;
margin-top:15px;
}

.price{
font-size:24px;
color:#22c55e;
margin-top:10px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-top:20px;
}

.gallery img{
width:100%;
}

</style>
</head>

<body>

<header>
🧠 Image Value Lab
</header>

<div class="container">

<div class="card">

<h2>Upload an Image</h2>

<input type="file" id="upload" accept="image/*">

<img id="preview" style="display:none;">

<div class="price" id="price"></div>
<div id="rarity"></div>

</div>

<div class="card">

<h2>Your Image Gallery</h2>

<div class="gallery" id="gallery"></div>

</div>

</div>

<script>

const upload = document.getElementById("upload");
const preview = document.getElementById("preview");
const price = document.getElementById("price");
const rarity = document.getElementById("rarity");
const gallery = document.getElementById("gallery");

const rarityLevels = [
"Common",
"Uncommon",
"Rare",
"Epic",
"Legendary"
];

upload.addEventListener("change", function(){

const file = upload.files[0];

if(file){

const imageURL = URL.createObjectURL(file);

preview.src = imageURL;
preview.style.display = "block";

let estimatedPrice = Math.floor(Math.random()*500)+20;
let rarityScore = rarityLevels[Math.floor(Math.random()*rarityLevels.length)];

price.innerText = "Estimated Value: $" + estimatedPrice;
rarity.innerText = "Rarity Level: " + rarityScore;

const img = document.createElement("img");
img.src = imageURL;

gallery.appendChild(img);

}

});

</script>

</body>
</html>
