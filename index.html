<!DOCTYPE html>
<html>
<head>
<title>LEO PACKS</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

h1{
font-size:40px;
margin-top:20px;
}

.store{
display:flex;
justify-content:center;
gap:40px;
margin-top:40px;
flex-wrap:wrap;
}

.pack{
width:200px;
cursor:pointer;
transition:.3s;
}

.pack:hover{
transform:scale(1.1);
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
margin-top:30px;
}

#cards{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.card{
width:140px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,.6);
}

.gold{
border:4px solid gold;
}

#collectionPage{
display:none;
margin-top:40px;
}

input{
margin-top:20px;
}

</style>
</head>

<body>

<h1>🦁 LEO PACKS</h1>

<button onclick="showCollection()">MY COLLECTION</button>

<div class="store">

<img class="pack" src="IMG_0259.png" onclick="openPack()">
<img class="pack" src="IMG_0259.png" onclick="openPack()">
<img class="pack" src="IMG_0259.png" onclick="openPack()">

</div>

<div id="cards"></div>

<div id="collectionPage">

<h2>Your Card Collection</h2>

<input type="file" id="upload" multiple>

<div id="myCards"></div>

</div>

<script>

const players=[
"https://picsum.photos/200?1",
"https://picsum.photos/200?2",
"https://picsum.photos/200?3",
"https://picsum.photos/200?4",
"https://picsum.photos/200?5"
]

const ronaldo="https://picsum.photos/200?gold"

function openPack(){

let cards=document.getElementById("cards")
cards.innerHTML=""

for(let i=0;i<5;i++){

let img=document.createElement("img")

if(Math.random()<0.005){
img.src=ronaldo
img.className="card gold"
}else{
img.src=players[Math.floor(Math.random()*players.length)]
img.className="card"
}

cards.appendChild(img)

}

}

function showCollection(){

document.getElementById("collectionPage").style.display="block"

}

document.getElementById("upload").addEventListener("change",function(){

let container=document.getElementById("myCards")

for(let file of this.files){

let img=document.createElement("img")
img.src=URL.createObjectURL(file)
img.className="card"

container.appendChild(img)

}

})

</script>

</body>
</html>
