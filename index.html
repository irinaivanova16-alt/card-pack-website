<!DOCTYPE html>
<html>
<head>
<title>LEO PACKS</title>

<style>

body{
background:#0f172a;
font-family:Arial;
text-align:center;
color:white;
}

h1{
font-size:40px;
margin-top:20px;
}

#pack{
width:420px;
cursor:pointer;
margin-top:30px;
}

#cards{
margin-top:40px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
}

.card{
width:150px;
border-radius:10px;
}

.gold{
border:4px solid gold;
}

</style>
</head>

<body>

<h1>🦁 LEO PACKS</h1>

<h3 id="packs">Packs Left: 200</h3>

<img id="pack" src="IMG_0259.png" onclick="openPack()">

<div id="cards"></div>

<script>

let packs = 200

const players = [

"https://picsum.photos/200?1",
"https://picsum.photos/200?2",
"https://picsum.photos/200?3",
"https://picsum.photos/200?4",
"https://picsum.photos/200?5",
"https://picsum.photos/200?6"

]

const ronaldo = "https://picsum.photos/200?gold"

function openPack(){

if(packs <= 0){
alert("No packs left")
return
}

packs--

document.getElementById("packs").innerText = "Packs Left: " + packs

let cards = document.getElementById("cards")

cards.innerHTML=""

for(let i=0;i<5;i++){

let img = document.createElement("img")

if(Math.random() < 0.05){

img.src = ronaldo
img.className = "card gold"

}else{

let random = players[Math.floor(Math.random()*players.length)]
img.src = random
img.className = "card"

}

cards.appendChild(img)

}

}

</script>

</body>
</html>
