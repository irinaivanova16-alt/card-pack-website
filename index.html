<!DOCTYPE html>
<html>
<head>
<title>World Fireworks Game</title>

<style>

body{
margin:0;
font-family:Arial;
overflow:hidden;
background:#0f172a;
color:white;
text-align:center;
}

#map{
position:relative;
width:100vw;
height:100vh;
}

#map img{
width:100%;
height:100%;
object-fit:cover;
}

#marker{
position:absolute;
font-size:45px;
cursor:grab;
left:50%;
top:50%;
transform:translate(-50%,-50%);
}

#ui{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
text-align:center;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#f43f5e;
color:white;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#e11d48;
}

#countdown{
font-size:60px;
margin-top:10px;
}

.firework{
position:absolute;
font-size:30px;
animation:boom 1s ease-out forwards;
}

@keyframes boom{

0%{
transform:scale(0.3);
opacity:1;
}

100%{
transform:scale(2);
opacity:0;
}

}

</style>
</head>

<body>

<div id="map">

<img src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg">

<div id="marker">❌</div>

<div id="ui">

<h2>🌍 World Fireworks Game</h2>
<p>Drag the X and launch fireworks!</p>

<button onclick="launch()">Launch</button>

<div id="countdown"></div>

</div>

</div>

<script>

const marker=document.getElementById("marker")
const map=document.getElementById("map")
let dragging=false

marker.addEventListener("mousedown",()=>dragging=true)
document.addEventListener("mouseup",()=>dragging=false)

document.addEventListener("mousemove",(e)=>{

if(!dragging) return

const rect=map.getBoundingClientRect()

marker.style.left=(e.clientX-rect.left)+"px"
marker.style.top=(e.clientY-rect.top)+"px"

})

function launch(){

let count=3
const countdown=document.getElementById("countdown")

const timer=setInterval(()=>{

countdown.innerText=count

count--

if(count<0){

clearInterval(timer)

countdown.innerText="🎆"

fireworks()

}

},1000)

}

function fireworks(){

for(let i=0;i<8;i++){

let f=document.createElement("div")

f.className="firework"
f.innerText="🎆"

f.style.left=marker.style.left
f.style.top=marker.style.top

map.appendChild(f)

setTimeout(()=>f.remove(),1000)

}

}

</script>

</body>
</html>
