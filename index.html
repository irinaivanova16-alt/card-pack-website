<!DOCTYPE html>
<html>
<head>

<title>Image Value Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:linear-gradient(120deg,#0f172a,#1e3a8a);
color:white;
min-height:100vh;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(0,0,0,0.2);
backdrop-filter:blur(10px);
}

nav h1{
font-size:24px;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav li{
cursor:pointer;
opacity:0.8;
}

nav li:hover{
opacity:1;
}

.hero{
text-align:center;
padding:60px 20px;
}

.hero h2{
font-size:40px;
margin-bottom:10px;
}

.hero p{
opacity:0.8;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.upload-box{
border:2px dashed rgba(255,255,255,0.4);
padding:40px;
border-radius:15px;
text-align:center;
margin-top:30px;
transition:0.3s;
}

.upload-box:hover{
border-color:#60a5fa;
background:rgba(255,255,255,0.05);
}

input{
margin-top:20px;
}

.preview-card{
margin-top:30px;
background:#1e293b;
padding:20px;
border-radius:15px;
box-shadow:0 15px 30px rgba(0,0,0,0.4);
}

.preview-card img{
width:100%;
border-radius:10px;
}

.price{
font-size:28px;
color:#22c55e;
margin-top:10px;
}

.gallery{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

footer{
margin-top:60px;
padding:30px;
text-align:center;
opacity:0.6;
}

</style>

</head>

<body>

<nav>

<h1>🧠 Image Value Lab</h1>

<ul>
<li>Home</li>
<li>Gallery</li>
<li>Features</li>
<li>About</li>
</ul>

</nav>

<section class="hero">

<h2>AI Image Price Analyzer</h2>
<p>Upload an image and discover its estimated value</p>

</section>

<div class="container">

<div class="upload-box">

<h3>Upload Your Image</h3>

<input type="file" id="upload" accept="image/*">

</div>

<div class="preview-card" id="previewCard" style="display:none;">

<img id="preview">

<div class="price" id="price"></div>
<div id="rarity"></div>

</div>

<h2 style="margin-top:40px">Your Gallery</h2>

<div class="gallery" id="gallery"></div>

</div>

<footer>

Built with ❤️ on GitHub Pages

</footer>

<script>

const upload = document.getElementById("upload")
const preview = document.getElementById("preview")
const price = document.getElementById("price")
const rarity = document.getElementById("rarity")
const gallery = document.getElementById("gallery")
const previewCard = document.getElementById("previewCard")

const rarityLevels=["Common","Uncommon","Rare","Epic","Legendary"]

upload.addEventListener("change",function(){

const file = upload.files[0]

if(file){

const url = URL.createObjectURL(file)

preview.src=url

previewCard.style.display="block"

let value=Math.floor(Math.random()*500)+50
let rarityLevel=rarityLevels[Math.floor(Math.random()*rarityLevels.length)]

price.innerText="Estimated Value: $"+value
rarity.innerText="Rarity: "+rarityLevel

let img=document.createElement("img")
img.src=url

gallery.appendChild(img)

}

})

</script>

</body>
</html>
