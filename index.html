<!DOCTYPE html>
<html>
<head>
<title>Meteor Drop Game</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

h1{
margin:20px;
}

#map{
position:relative;
width:90%;
max-width:900px;
margin:auto;
}

#map img{
width:100%;
border-radius:10px;
}

#marker{
position:absolute;
font-size:40px;
cursor:grab;
}

#countdown{
font-size:50px;
margin-top:20px;
}

.meteor{
position:absolute;
font-size:30px;
animation:fall 1s linear forwards;
}

@keyframes fall{
from{
transform:translateY(-200px);
}
to{
transform:translateY(0);
}
}

button{
margin-top:20px;
padding:10px 20px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🌍 Meteor Drop Game</h1>
<p>Drag the X on the map and launch meteors!</p>

<div id="map">

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/World_map_-_low_resolution.svg/2000px-World_map_-_low_resolution.svg.png">

<div id="marker">❌</div>

</div>

<div id="countdown"></div>

<button onclick="launch()">Launch Meteors</button>

<script>

const marker=document.getElementById("marker")
const map=document.getElementById("map")
let offsetX,offsetY

marker.onmousedown=function(e){

offsetX=e.offsetX
offsetY=e.offsetY

document.onmousemove=function(e){

const rect=map.getBoundingClientRect()

marker.style.left=(e.clientX-rect.left-offsetX)+"px"
marker.style.top=(e.clientY-rect.top-offsetY)+"px"

}

document.onmouseup=function(){
document.onmousemove=null
}

}

function launch(){

let count=3
const countdown=document.getElementById("countdown")

const timer=setInterval(()=>{

countdown.innerText=count

count--

if(count<0){

clearInterval(timer)

countdown.innerText="💥"

dropMeteors()

}

},1000)

}

function dropMeteors(){

for(let i=0;i<6;i++){

let meteor=document.createElement("div")

meteor.className="meteor"
meteor.innerText="☄️"

meteor.style.left=marker.style.left
meteor.style.top=marker.style.top

map.appendChild(meteor)

}

}

</script>

</body>
</html>
