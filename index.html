<!DOCTYPE html>
<html>
<head>
<title>Soccer Card Shop</title>

<style>

body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

h1{
    margin-top:30px;
}

.shop{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:40px;
    flex-wrap:wrap;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    width:200px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.5);
}

.card img{
    width:100%;
    border-radius:8px;
}

.price{
    font-size:20px;
    margin:10px 0;
    color:#22c55e;
}

button{
    background:#3b82f6;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

</style>
</head>

<body>

<h1>⚽ Soccer Card Shop</h1>
<p>Browse our soccer cards collection!</p>

<div class="shop">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/8c/Lionel_Messi_20180626.jpg">
<h3>Lionel Messi Card</h3>
<div class="price">$120</div>
<button>Buy</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/8f/Cristiano_Ronaldo_2018.jpg">
<h3>Cristiano Ronaldo Card</h3>
<div class="price">$150</div>
<button>Buy</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Kylian_Mbappe_2019.jpg">
<h3>Kylian Mbappé Card</h3>
<div class="price">$95</div>
<button>Buy</button>
</div>

</div>

</body>
</html>
