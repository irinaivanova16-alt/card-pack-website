<!DOCTYPE html>
<html>
<head>
<title>LEO PACKS</title>

<style>

body{
background:#0f172a;
font-family:Arial;
text-align:center;
color:white;
}

h1{
margin-top:40px;
font-size:40px;
}

#pack{
width:220px;
cursor:pointer;
transition:0.3s;
margin-top:40px;
}

#pack:hover{
transform:scale(1.1);
}

#cards{
margin-top:40px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.card{
width:130px;
height:180px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:14px;
animation:flip 0.6s;
}

.common{
background:#cbd5e1;
color:black;
}

.rare{
background:#4ade80;
color:black;
}

.ultra{
background:gold;
color:black;
box-shadow:0 0 20px gold;
}

@keyframes flip{
from{
transform:rotateY(90deg);
}
to{
transform:rotateY(0deg);
}
}

</style>
</head>

<body>

<h1>LEO PACKS</h1>
<p>Click the pack to open</p>

<img id="pack" src="IMG_0259.png">

<div id="cards"></div>

<script>

const commons = [
"Lionel Messi",
"Neymar",
"Kylian Mbappe",
"Luka Modric",
"Kevin De Bruyne",
"Erling Haaland",
"Harry Kane",
"Vinicius Jr",
"Pedri",
"Bellingham"
]

const rares = [
"Zinedine Zidane",
"Ronaldinho",
"David Beckham",
"Thierry Henry",
"Andres Iniesta"
]

const ultraRare = "Golden Cristiano Ronaldo ⭐"

document.getElementById("pack").onclick = openPack

function openPack(){

document.getElementById("cards").innerHTML=""

let pack=[]

for(let i=0;i<8;i++){
pack.push({
name: commons[Math.floor(Math.random()*commons.length)],
rarity:"common"
})
}

pack.push({
name: rares[Math.floor(Math.random()*rares.length)],
rarity:"rare"
})

let chance = Math.floor(Math.random()*200)

if(chance === 1){

pack.push({
name: ultraRare,
rarity:"ultra"
})

}else{

pack.push({
name: commons[Math.floor(Math.random()*commons.length)],
rarity:"common"
})

}

revealCards(pack)

}

function revealCards(pack){

let i = 0

function showCard(){

if(i >= pack.length) return

let card = document.createElement("div")

card.classList.add("card")
card.classList.add(pack[i].rarity)

card.innerText = pack[i].name

document.getElementById("cards").appendChild(card)

i++

setTimeout(showCard,400)

}

showCard()

}

</script>

</body>
</html>
