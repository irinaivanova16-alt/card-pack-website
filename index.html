<!DOCTYPE html>
<html>
<head>
<title>LEO PACKS Store</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
}

header{
background:#111827;
padding:20px;
font-size:32px;
font-weight:bold;
letter-spacing:2px;
}

.store{
margin-top:40px;
}

.pack-container{
background:white;
color:black;
width:320px;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

#pack{
width:260px;
cursor:pointer;
transition:0.3s;
}

#pack:hover{
transform:scale(1.1);
}

#cards{
margin-top:40px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
width:150px;
height:210px;
border-radius:12px;
overflow:hidden;
animation:flip 0.5s;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.ultra{
box-shadow:0 0 25px gold;
}

@keyframes flip{
from{transform:rotateY(90deg);}
to{transform:rotateY(0deg);}
}

</style>
</head>

<body>

<header>🦁 LEO PACKS</header>

<div class="store">

<div class="pack-container">
<h2>Premium Pack</h2>
<p>10 Cards • 1 Guaranteed Rare</p>

<img id="pack" src="IMG_0259.png">

<p>Click pack to open</p>
</div>

</div>

<div id="cards"></div>

<script>

const commons = [
"https://i.imgur.com/jqG4Z9B.png",
"https://i.imgur.com/yXOvdOS.png",
"https://i.imgur.com/gd2kV8X.png",
"https://i.imgur.com/r5W9GJY.png"
]

const rares = [
"https://i.imgur.com/txN4K9F.png",
"https://i.imgur.com/akvFq5T.png"
]

const ultra =
"https://i.imgur.com/qO7QZkK.png"

document.getElementById("pack").onclick=openPack

function openPack(){

document.getElementById("cards").innerHTML=""

let pack=[]

for(let i=0;i<8;i++){
pack.push({
img:commons[Math.floor(Math.random()*commons.length)],
rarity:"common"
})
}

pack.push({
img:rares[Math.floor(Math.random()*rares.length)],
rarity:"rare"
})

let chance=Math.floor(Math.random()*200)

if(chance===1){
pack.push({img:ultra,rarity:"ultra"})
}else{
pack.push({
img:commons[Math.floor(Math.random()*commons.length)],
rarity:"common"
})
}

reveal(pack)

}

function reveal(pack){

let i=0

function show(){

if(i>=pack.length) return

let card=document.createElement("div")

card.classList.add("card")

if(pack[i].rarity==="ultra"){
card.classList.add("ultra")
}

let img=document.createElement("img")

img.src=pack[i].img

card.appendChild(img)

document.getElementById("cards").appendChild(card)

i++

setTimeout(show,400)

}

show()

}

</script>

</body>
</html>
